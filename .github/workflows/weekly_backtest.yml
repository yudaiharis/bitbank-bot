name: Weekly Backtest & Auto-Optimize

on:
  schedule:
    # 毎週日曜 JST 02:00 = UTC 17:00（土曜）
    - cron: '0 17 * * 6'
  workflow_dispatch:
    inputs:
      days:
        description: 'バックテスト期間（日）'
        default: '90'
      candle:
        description: '足種'
        default: '5min'
      dry_run:
        description: 'Dry run（コミットしない）'
        type: boolean
        default: false

permissions:
  contents: write  # config.yaml / reports/ のコミット・プッシュに必要

env:
  DAYS:   ${{ github.event.inputs.days   || '90' }}
  CANDLE: ${{ github.event.inputs.candle || '5min' }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: 全ペア並列バックテスト＋最適化
  # ─────────────────────────────────────────────────────────────
  backtest:
    name: 全ペアバックテスト（並列）
    runs-on: ubuntu-latest
    outputs:
      passed:  ${{ steps.threshold.outputs.passed }}
      summary: ${{ steps.threshold.outputs.summary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: キャッシュ済みデータを復元
        uses: actions/cache@v4
        with:
          path: backtest/data
          key: backtest-data-${{ env.CANDLE }}-${{ env.DAYS }}-${{ github.run_id }}
          restore-keys: |
            backtest-data-${{ env.CANDLE }}-${{ env.DAYS }}-

      - name: 全ペア並列バックテスト＋最適化
        run: |
          python backtest/engine.py \
            --all-pairs \
            --days ${{ env.DAYS }} \
            --candle ${{ env.CANDLE }} \
            --optimize \
            --update
        env:
          PYTHONUNBUFFERED: "1"

      - name: 閾値チェック
        id: threshold
        run: python deploy/check_backtest_thresholds.py
        env:
          BT_MIN_WIN_RATE:      "0.40"   # 平均勝率 40% 以上
          BT_MAX_DRAWDOWN:      "0.05"   # 平均最大DD 5% 以下
          BT_MIN_POSITIVE_PAIRS: "4"     # プラス損益ペア数 4 以上（7ペア中）

      - name: バックテスト結果をアーティファクト保存
        uses: actions/upload-artifact@v4
        with:
          name: backtest-reports-${{ github.run_id }}
          path: reports/backtest_*.md
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Job 2: 閾値合格時 → config.yaml をコミット
  # ─────────────────────────────────────────────────────────────
  commit-config:
    name: 最適パラメータをコミット
    needs: backtest
    if: |
      needs.backtest.outputs.passed == 'true' &&
      github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: キャッシュ済みデータを復元（Job 1と共有）
        uses: actions/cache@v4
        with:
          path: backtest/data
          key: backtest-data-${{ env.CANDLE }}-${{ env.DAYS }}-${{ github.run_id }}
          restore-keys: |
            backtest-data-${{ env.CANDLE }}-${{ env.DAYS }}-

      - name: 全ペア並列バックテスト（config更新）
        run: |
          python backtest/engine.py \
            --all-pairs \
            --days ${{ env.DAYS }} \
            --candle ${{ env.CANDLE }} \
            --optimize \
            --update

      - name: 変更確認
        id: diff
        run: |
          git diff --quiet config.yaml && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: config.yaml をコミット＆プッシュ
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "bitbank-bot[CI]"
          git config user.email "bot@github-actions.invalid"
          git add config.yaml
          git commit -m "chore: auto-optimize config [${{ env.DAYS }}日/${{ env.CANDLE }}] - ${{ needs.backtest.outputs.summary }}"
          git push

      - name: Slack 成功通知
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          python -c "
          import requests, json, os
          url  = os.environ['SLACK_WEBHOOK_URL']
          body = {
            'text': '✅ *週次バックテスト合格・config更新*',
            'blocks': [{
              'type': 'section',
              'text': {
                'type': 'mrkdwn',
                'text': '✅ *週次バックテスト合格 → config.yaml 自動更新*\n${{ needs.backtest.outputs.summary }}'
              }
            }]
          }
          requests.post(url, json=body, timeout=5)
          "
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ─────────────────────────────────────────────────────────────
  # Job 3: GCP デプロイ（SSH で git pull + サービス再起動）
  #   必要な GitHub Secrets:
  #     GCP_HOST     : GCP インスタンスの外部 IP
  #     GCP_USER     : SSH ユーザー名（例: ubuntu）
  #     GCP_SSH_KEY  : SSH 秘密鍵（-----BEGIN OPENSSH PRIVATE KEY----- ...）
  #     GCP_BOT_DIR  : ボットのディレクトリ（例: /home/ubuntu/bitbank-bot）
  # ─────────────────────────────────────────────────────────────
  deploy-gcp:
    name: GCP デプロイ（git pull + 再起動）
    needs: commit-config
    # GCP_HOST が設定されている場合のみ実行（ローカル開発時はスキップ）
    # NOTE: secrets は式で直接比較できないため vars.GCP_HOST_SET フラグを使う
    if: vars.GCP_HOST_SET == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: SSH キーのセットアップ
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/gcp_key
          chmod 600 ~/.ssh/gcp_key
          ssh-keyscan -H "${{ secrets.GCP_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: GCP で git pull + ボット再起動
        run: |
          ssh -i ~/.ssh/gcp_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}" \
              "
              set -e
              BOT_DIR='${{ secrets.GCP_BOT_DIR }}'
              cd \"\$BOT_DIR\"

              echo '[1/3] git pull で最新 config.yaml を取得...'
              git pull origin main

              echo '[2/3] Docker Compose でコンテナを再起動...'
              docker compose up -d --build

              echo '[3/3] 起動確認...'
              sleep 8
              docker compose ps | grep -E 'paper|web|cloudflared' \
                && echo 'OK: コンテナ起動確認' \
                || (echo 'ERROR: コンテナ起動失敗' && docker compose logs --tail=20 && exit 1)
              "

      - name: SSH キーを削除（クリーンアップ）
        if: always()
        run: rm -f ~/.ssh/gcp_key

      - name: Slack デプロイ完了通知
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          python3 -c "
          import requests, os
          url = os.environ.get('SLACK_WEBHOOK_URL','')
          if not url: exit(0)
          requests.post(url, json={
            'text': ':rocket: *GCP デプロイ完了* - 新しい config.yaml で bitbank-bot を再起動しました'
          }, timeout=5)
          "
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ─────────────────────────────────────────────────────────────
  # Job 4: 閾値不合格時 → Slack 警告
  # ─────────────────────────────────────────────────────────────
  notify-failure:
    name: 閾値不合格通知
    needs: backtest
    if: needs.backtest.outputs.passed == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Slack 警告通知
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          python3 -c "
          import requests, os
          url = os.environ.get('SLACK_WEBHOOK_URL','')
          if not url: exit(0)
          requests.post(url, json={
            'text': '⚠️ *週次バックテスト不合格 - config更新スキップ*\n${{ needs.backtest.outputs.summary }}'
          }, timeout=5)
          "
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
