volumes:
  trades-data:    # trades.db を永続化する named volume

services:
  # ── Webダッシュボード ──────────────────────────────────────
  web:
    build: .
    image: bitbank-bot
    command: python monitor/web_dashboard.py
    ports:
      - "8080:5000"
    volumes:
      - trades-data:/app/data
      - ./reports:/app/reports
      - ./config.yaml:/app/config.yaml
    environment:
      - TRADES_DB=/app/data/trades.db
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-yudaiharis/bitbank-bot}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 384m

  # ── ペーパートレード（常時起動）────────────────────────────
  paper:
    build: .
    image: bitbank-bot
    command: python main.py --mode paper
    volumes:
      - trades-data:/app/data
      - ./reports:/app/reports
      - ./config.yaml:/app/config.yaml
    environment:
      - TRADES_DB=/app/data/trades.db
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 768m

  # ── Cloudflare Tunnel（HTTPS公開）────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - web
    mem_limit: 64m
    memswap_limit: 128m
    profiles:
      - cloudflare

  # ── バックテスト（手動実行: docker compose run --rm backtest）
  backtest:
    build: .
    image: bitbank-bot
    command: >
      python backtest/engine.py
      --all-pairs
      --days ${DAYS:-90}
      --candle ${CANDLE:-5min}
      ${OPTIMIZE:+--optimize}
      ${UPDATE:+--update}
    volumes:
      - ./reports:/app/reports
      - ./backtest/data:/app/backtest/data
      - ./config.yaml:/app/config.yaml
    profiles:
      - backtest
